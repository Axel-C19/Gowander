name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Backend: full QA suite (functional, non-functional, structural,
  #     regression — ISW112 Unidad II) ─────────────────────────────────────
  backend:
    name: Backend — lint + QA test suite
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-test-secret-key-not-for-prod
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r apps/backend/requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check apps/backend/app

      - name: Run QA test suite
        working-directory: apps/backend
        run: pytest tests/ -v --tb=short

  # ─── Mobile: dependency integrity + unit tests ───────────────────────────
  mobile:
    name: Mobile — install + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test --workspace=apps/mobile
